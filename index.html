<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f766e">
<title>社内通知 設定</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230f766e'/%3E%3Ctext x='32' y='46' font-size='40' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'%3E通%3C/text%3E%3C/svg%3E">
<style>
  :root{ --bg:#f1f5f9; --card:#fff; --ink:#0f172a; --sub:#64748b; --line:#e2e8f0;
         --teal:#0f766e; --teal2:#0d9488; --red:#e11d48; --amber:#b45309; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; font-family:-apple-system,"Segoe UI",Roboto,"Helvetica Neue","Noto Sans JP",sans-serif;
        background:var(--bg); color:var(--ink); line-height:1.6; }
  header{ position:sticky; top:0; z-index:5; background:var(--teal); color:#fff; padding:13px 16px 0; }
  header .t{ font-size:18px; font-weight:800; letter-spacing:.02em; }
  header .s{ font-size:12px; opacity:.85; margin:2px 0 10px; }
  /* 人タブ */
  .tabs{ display:flex; gap:4px; max-width:640px; margin:0 auto; }
  .tab{ flex:1; text-align:center; padding:10px 4px 9px; font-size:15px; font-weight:700; color:#c7ded9;
        border-radius:12px 12px 0 0; cursor:pointer; user-select:none; position:relative; }
  .tab.act{ background:var(--bg); color:var(--teal); }
  .tab .off-mark{ display:block; font-size:9.5px; font-weight:600; color:#fca5a5; line-height:1; margin-top:1px; }
  .tab.act .off-mark{ color:var(--red); }
  .tab .on-mark{ display:block; font-size:9.5px; font-weight:600; opacity:.75; line-height:1; margin-top:1px; }

  .wrap{ max-width:640px; margin:0 auto; padding:14px 12px 120px; }

  /* ===== ログインゲート ===== */
  #gate{ position:fixed; inset:0; z-index:50; background:linear-gradient(160deg,#0f766e,#134e4a);
         display:flex; align-items:center; justify-content:center; padding:20px; }
  #gate .box{ width:100%; max-width:340px; background:#fff; border-radius:18px; padding:24px 20px;
              box-shadow:0 20px 50px rgba(0,0,0,.3); }
  #gate h1{ margin:0 0 4px; font-size:19px; text-align:center; }
  #gate p{ margin:0 0 18px; font-size:12px; color:var(--sub); text-align:center; }
  #gate input{ width:100%; padding:12px 14px; margin-bottom:10px; border:1.5px solid var(--line);
               border-radius:10px; font-size:16px; }
  #gate .row{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--sub); margin:2px 2px 14px; }
  #gate button{ width:100%; padding:13px; border:0; border-radius:10px; background:var(--teal);
                color:#fff; font-size:16px; font-weight:700; }
  #gate .err{ color:var(--red); font-size:12.5px; text-align:center; min-height:18px; margin-bottom:8px; }

  .card{ background:var(--card); border:1px solid var(--line); border-radius:16px;
         padding:14px; margin-bottom:12px; box-shadow:0 1px 2px rgba(0,0,0,.04); }
  .mrow{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
  .mrow .ml{ font-size:15px; font-weight:800; }
  .mrow .ms{ font-size:11.5px; color:var(--sub); margin-top:1px; }

  .sw{ position:relative; display:inline-block; width:50px; height:29px; flex:0 0 auto; }
  .sw input{ display:none; }
  .sw .t{ position:absolute; inset:0; background:#cbd5e1; border-radius:999px; transition:.18s; }
  .sw .t:before{ content:""; position:absolute; width:23px; height:23px; left:3px; top:3px;
                 background:#fff; border-radius:50%; transition:.18s; box-shadow:0 1px 3px rgba(0,0,0,.3); }
  .sw input:checked + .t{ background:var(--teal2); }
  .sw input:checked + .t:before{ transform:translateX(21px); }
  .sw.sm{ width:42px; height:25px; }
  .sw.sm .t:before{ width:19px; height:19px; }
  .sw.sm input:checked + .t:before{ transform:translateX(17px); }

  .sec-l{ font-size:12px; color:var(--sub); font-weight:700; margin:16px 4px 7px; }
  .master-off{ opacity:.45; pointer-events:none; }

  .trow{ display:flex; align-items:center; gap:10px; border:1.5px solid var(--line);
         border-radius:12px; padding:10px 10px 10px 12px; background:#f8fafc; margin-bottom:8px; }
  .trow .tmeta{ flex:1; min-width:0; }
  .trow .tname{ font-size:14px; font-weight:700; }
  .trow .tdesc{ font-size:11.5px; color:var(--sub); margin-top:1px; line-height:1.35; }
  .trow.on{ background:#ecfdf5; border-color:#99e5d3; }
  .trow.paused .tname{ color:var(--sub); }
  .del{ width:30px; height:30px; border:1px solid var(--line); border-radius:9px; background:#fff;
        color:#94a3b8; font-size:14px; display:flex; align-items:center; justify-content:center;
        cursor:pointer; flex:0 0 auto; }
  .del:active{ color:var(--red); border-color:var(--red); }

  /* カタログ（削除済み一覧） */
  .addbtn{ width:100%; padding:11px; border:1.5px dashed #94a3b8; border-radius:12px; background:transparent;
           color:var(--sub); font-size:13.5px; font-weight:700; cursor:pointer; }
  .addbtn:disabled{ opacity:.4; }
  .cat{ margin-top:8px; border:1.5px solid var(--line); border-radius:12px; overflow:hidden; display:none; }
  .cat.show{ display:block; }
  .crow{ display:flex; align-items:center; gap:10px; padding:10px 12px; background:#fff; border-bottom:1px solid var(--line); }
  .crow:last-child{ border-bottom:0; }
  .crow .tmeta{ flex:1; min-width:0; }
  .crow .tname{ font-size:14px; font-weight:700; color:var(--sub); }
  .crow .tdesc{ font-size:11.5px; color:#94a3b8; margin-top:1px; line-height:1.35; }
  .crow .add{ flex:0 0 auto; padding:7px 14px; border:0; border-radius:9px; background:var(--teal);
              color:#fff; font-size:13px; font-weight:700; cursor:pointer; }
  .cat .none{ padding:12px; font-size:12.5px; color:#94a3b8; text-align:center; }

  .memo-l{ font-size:12px; color:var(--sub); margin:14px 2px 5px; }
  textarea{ width:100%; border:1.5px solid var(--line); border-radius:10px; padding:10px 12px;
            font-size:14px; font-family:inherit; resize:vertical; min-height:52px; }
  .applied{ font-size:11.5px; color:var(--amber); margin-top:6px; background:#fffbeb;
            border:1px solid #fde68a; border-radius:8px; padding:6px 9px; }

  #bar{ position:fixed; left:0; right:0; bottom:0; z-index:8; padding:12px 12px calc(12px + env(safe-area-inset-bottom,0));
        background:linear-gradient(#ffffff00,#fff 30%); }
  #bar .inner{ max-width:640px; margin:0 auto; display:flex; gap:10px; align-items:center; }
  #save{ flex:1; padding:14px; border:0; border-radius:12px; background:var(--teal); color:#fff;
         font-size:16px; font-weight:800; box-shadow:0 6px 16px rgba(15,118,110,.35); }
  #save:disabled{ background:#94a3b8; box-shadow:none; }
  #status{ font-size:12px; color:var(--sub); min-width:64px; text-align:right; }
  .dirty #save{ background:var(--red); box-shadow:0 6px 16px rgba(225,29,72,.35); }
  .toast{ position:fixed; left:50%; bottom:78px; transform:translateX(-50%); background:#0f172a; color:#fff;
          padding:10px 16px; border-radius:999px; font-size:13px; opacity:0; transition:.25s; z-index:20; pointer-events:none; }
  .toast.show{ opacity:.95; }
</style>
</head>
<body>

<!-- ログインゲート -->
<div id="gate">
  <div class="box">
    <h1>社内通知 設定</h1>
    <p>林材木店 社内ツール（ボード共通ログイン）</p>
    <div class="err" id="gateErr"></div>
    <input id="gMail" type="email" placeholder="メールアドレス" autocomplete="username">
    <input id="gPass" type="password" placeholder="パスワード" autocomplete="current-password">
    <label class="row"><input type="checkbox" id="gKeep" checked> この端末でログインを保持する</label>
    <button id="gBtn">ログイン</button>
  </div>
</div>

<header>
  <div class="t">📣 社内通知 設定</div>
  <div class="s">LINEの社内通知を、人ごとに「受け取る通知」だけに絞れる</div>
  <div class="tabs" id="tabs"></div>
</header>

<div class="wrap" id="app" style="display:none"></div>

<div id="bar" style="display:none">
  <div class="inner">
    <span id="status"></span>
    <button id="save" disabled>保存</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycby6RTCYRAmBoGa0P4QDAb0mx_NeXARoHVncQtxp2X5IXUEYW86Jy2ECS9YPqhHFvzoZ/exec";
const CRED_KEY = "notify_creds_v1";
const TAB_KEY  = "notify_tab_v1";
// 通知種別はサーバー（notify_types レジストリ）から取得する。load() 成功時に設定してから render。
let TYPES = [];
const $ = id => document.getElementById(id);
let DATA = [];        // rows from server
let CUR = localStorage.getItem(TAB_KEY) || "daiki";
let dirty = false;
let catalogOpen = false;

/* ---------- 認証（共通SSO: h02050d-ship-it.github.io の他ツールのログインを引き継ぐ） ---------- */
const SSO_KEY="hayazai_sso_cred";
const SSO_PEERS=["hayazai_board_cred","hayazai_seiso_cred","hayazai_rulebook_cred","hayazai_kaizen_cred","notify_creds_v1","seinodesk_cred","faxdesk_cred","orderdesk_cred","nippou_cred"];
function ssoFind_(){
  const keys=[SSO_KEY].concat(SSO_PEERS);
  for(const k of keys){
    try{ const v=JSON.parse(localStorage.getItem(k)||"null");
      if(v){ const email=v.email||v.e, pass=v.pass||v.p; if(email&&pass) return {email:String(email),pass:String(pass)}; }
    }catch(e){}
  }
  return null;
}
function ssoWrite(email,pass){ try{ localStorage.setItem(SSO_KEY,JSON.stringify({email:email,pass:pass})); }catch(e){} }
function ssoClear(){ try{ localStorage.removeItem(SSO_KEY); }catch(e){} }
function creds(){
  try{ const v=JSON.parse(localStorage.getItem(CRED_KEY)||"null"); if(v&&v.email&&v.pass) return v; }catch(e){}
  const s=ssoFind_(); if(s){ try{ localStorage.setItem(CRED_KEY,JSON.stringify(s)); }catch(e){} return s; }
  return {};
}
function saveCreds(email,pass,keep){ if(keep) localStorage.setItem(CRED_KEY, JSON.stringify({email,pass})); ssoWrite(email,pass); }
function clearCreds(){ localStorage.removeItem(CRED_KEY); ssoClear(); }
function showGate(msg){ $("gate").style.display="flex"; $("gateErr").textContent=msg||""; }
function hideGate(){ $("gate").style.display="none"; }

$("gBtn").onclick = submitGate;
["gMail","gPass"].forEach(id => $(id).addEventListener("keydown", e => { if(e.key==="Enter") submitGate(); }));
function submitGate(){
  const email = $("gMail").value.trim(), pass = $("gPass").value;
  if(!email || !pass){ $("gateErr").textContent="メールとパスワードを入力してください"; return; }
  saveCreds(email, pass, $("gKeep").checked);
  $("gBtn").textContent="確認中…"; $("gBtn").disabled=true;
  load();
}

/* ---------- 通信 ---------- */
async function load(){
  const c = creds();
  if(!c.pass){ showGate(""); return; }
  try{
    const r = await fetch(GAS_URL + "?notify=1&pass=" + encodeURIComponent(c.pass));
    const j = await r.json();
    if(!j.ok){
      if(j.error==="unauthorized"){ clearCreds(); showGate("メールまたはパスワードが違います"); }
      else showGate("エラー: " + (j.error||"不明"));
      $("gBtn").textContent="ログイン"; $("gBtn").disabled=false;
      return;
    }
    // 種別レジストリ（後方互換：旧サーバーは types を文字列配列で返す）
    TYPES = (j.settings.types||[]).map(t => typeof t==="string" ? {k:t,label:t,desc:""} : t);
    DATA = j.settings.rows;
    hideGate(); $("app").style.display=""; $("bar").style.display="";
    render(); setDirty(false);
  }catch(e){
    showGate("接続できませんでした。通信環境を確認してください");
    $("gBtn").textContent="ログイン"; $("gBtn").disabled=false;
  }
}

async function save(){
  const c = creds();
  $("save").disabled=true; $("status").textContent="保存中…";
  const rows = DATA.map(r => {
    const o = { who:r.who, master:!!r.master, memo:r.memo||"", removed:r.removed||"" };
    TYPES.forEach(t => o[t.k] = !!r[t.k]);
    return o;
  });
  try{
    const r = await fetch(GAS_URL, { method:"POST", headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({ action:"saveNotify", pass:c.pass, rows }) });
    const j = await r.json();
    if(!j.ok) throw new Error(j.error||"save");
    DATA = j.settings.rows;
    render(); setDirty(false); $("status").textContent="";
    toast("✓ 保存しました");
  }catch(e){
    $("save").disabled=false; $("status").textContent="失敗"; toast("保存に失敗しました");
  }
}
$("save").onclick = save;

/* ---------- helpers ---------- */
const rowOf   = who => DATA.find(r => r.who === who);
const removedSet = r => new Set(String(r.removed||"").split(",").map(s=>s.trim()).filter(Boolean));
function setRemoved(r, set){ r.removed = [...set].join(","); }
function setDirty(v){ dirty=v; document.body.classList.toggle("dirty", v);
  $("save").disabled = !v; $("status").textContent = v ? "未保存" : ""; }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
let toastT;
function toast(m){ const t=$("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove("show"), 1900); }

/* ---------- 描画 ---------- */
function render(){
  // タブ
  $("tabs").innerHTML = DATA.map(r => {
    const act = r.who===CUR ? " act" : "";
    const rm = removedSet(r);
    const activeCount = TYPES.filter(t=>!rm.has(t.k)).length;
    const mark = r.master
      ? `<span class="on-mark">${activeCount}件</span>`
      : `<span class="off-mark">停止中</span>`;
    return `<div class="tab${act}" data-who="${r.who}">${escapeHtml(r.name||r.who)}${mark}</div>`;
  }).join("");
  document.querySelectorAll(".tab").forEach(el => el.onclick = () => {
    CUR = el.dataset.who; localStorage.setItem(TAB_KEY, CUR); catalogOpen=false; render();
  });

  const r = rowOf(CUR);
  if(!r){ $("app").innerHTML=""; return; }
  const rm = removedSet(r);
  const act = TYPES.filter(t=>!rm.has(t.k));
  const del = TYPES.filter(t=> rm.has(t.k));

  const rows = act.map(t => {
    const on = !!r[t.k];
    return `<div class="trow ${on?'on':'paused'}">
      <div class="tmeta"><div class="tname">${t.label}</div><div class="tdesc">${t.desc}</div></div>
      <label class="sw sm"><input type="checkbox" data-toggle="${t.k}" ${on?'checked':''}><span class="t"></span></label>
      <div class="del" data-del="${t.k}" title="この通知を外す">✕</div>
    </div>`;
  }).join("") || `<div class="cat show"><div class="none">受け取る通知がありません。下の「＋通知を追加」から選べます</div></div>`;

  const catRows = del.length ? del.map(t => `
    <div class="crow">
      <div class="tmeta"><div class="tname">${t.label}</div><div class="tdesc">${t.desc}</div></div>
      <button class="add" data-add="${t.k}">追加</button>
    </div>`).join("") : `<div class="none">追加できる通知はありません（すべて受信中）</div>`;

  const applied = (r.applied && String(r.applied).trim())
    ? `<div class="applied">🤖 ${escapeHtml(String(r.applied))}</div>` : "";

  $("app").innerHTML = `
    <div class="card">
      <div class="mrow">
        <div><div class="ml">${escapeHtml(r.name||r.who)}さんの通知</div>
             <div class="ms">${r.master ? "受け取る通知だけ下に残してください" : "すべての通知を停止中です"}</div></div>
        <label class="sw"><input type="checkbox" id="master" ${r.master?'checked':''}><span class="t"></span></label>
      </div>
    </div>
    <div class="${r.master?'':'master-off'}">
      <div class="sec-l">受け取る通知（スイッチ=一時停止 ／ ✕=一覧から外す）</div>
      ${rows}
      <button class="addbtn" id="addOpen">＋ 通知を追加${del.length?`（あと${del.length}種類）`:""}</button>
      <div class="cat ${catalogOpen?'show':''}" id="catalog">${catRows}</div>
      <div class="memo-l">条件メモ（自由文）— 書いておくと毎朝AIが読んで、その日の通知を自動調整します</div>
      <textarea id="memo" placeholder="例）金曜はタスク通知いらない ／ 今週は呼出以外止めて">${escapeHtml(r.memo||"")}</textarea>
      ${applied}
    </div>`;

  // handlers
  $("master").onchange = e => { r.master = e.target.checked; setDirty(true); render(); };
  document.querySelectorAll("[data-toggle]").forEach(el => el.onchange = () => {
    r[el.dataset.toggle] = el.checked; setDirty(true); render();
  });
  document.querySelectorAll("[data-del]").forEach(el => el.onclick = () => {
    const k = el.dataset.del; const s = removedSet(r); s.add(k); setRemoved(r, s);
    r[k] = false; setDirty(true); render();
  });
  $("addOpen").onclick = () => { catalogOpen = !catalogOpen; render(); };
  document.querySelectorAll("[data-add]").forEach(el => el.onclick = () => {
    const k = el.dataset.add; const s = removedSet(r); s.delete(k); setRemoved(r, s);
    r[k] = true; setDirty(true); catalogOpen = true; render();
  });
  $("memo").oninput = e => { r.memo = e.target.value; setDirty(true); };
}

window.addEventListener("beforeunload", e => { if(dirty){ e.preventDefault(); e.returnValue=""; } });

/* 起動 */
(function(){ const c=creds(); if(c.email) $("gMail").value=c.email;
  if(c.pass) load(); else showGate(""); })();
</script>
</body>
</html>
